<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sulaf_perfume | فخامة العطر</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* الألوان الأساسية */
        :root {
            --gold: #c5a059;
            --black: #0a0a0a;
            --gray: #1a1a1a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Amiri', serif;
            overflow-x: hidden;
        }

        /* الهيدر (اللوجو والمينيو) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 10%;
            background: transparent;
            position: absolute;
            width: 80%;
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--gold);
            letter-spacing: 2px;
            text-decoration: none;
            text-transform: uppercase;
        }

        /* الجزء الرئيسي (Hero Section) */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1541643600914-78b084683601?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 8vw, 80px);
            margin-bottom: 20px;
            color: var(--white);
        }

        .hero-content p {
            font-size: 20px;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            transition: 0.4s;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .btn:hover {
            background-color: var(--gold);
            color: var(--black);
        }

        /* قسم المنتجات بشكل بسيط */
        .products {
            padding: 100px 10%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 50px;
            background-color: var(--black);
        }

        .card {
            text-align: center;
            border: 1px solid #222;
            padding: 20px;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--gold);
        }

        .card img {
            max-width: 100%;
            height: 400px;
            object-fit: cover;
            margin-bottom: 20px;
            filter: grayscale(20%);
        }

        .card h3 {
            color: var(--gold);
            font-size: 24px;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">LUXE AURA</a>
        <nav>
            <a href="#" style="color: white; text-decoration: none; margin-right: 20px;">المجموعة</a>
            <a href="#" style="color: white; text-decoration: none;">قصتنا</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <p>أناقة لا تُنسى</p>
            <h1>جوهر الفخامة</h1>
            <a href="#shop" class="btn">اكتشف المجموعه</a>
        </div>
    </section>

    <section id="shop" class="products">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&w=600&q=80" alt="Perfume 1">
            <h3>لايتون</h3>
            <p>مزيج من العود والجلد الفاخر</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?auto=format&fit=crop&w=600&q=80" alt="Perfume 2">
            <h3>خمره </h3>
            <p>نفحات من المسك والعنبر</p>
        </div>
    </section>

</body>
</html>
